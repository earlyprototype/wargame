# Mandatory diplomatic encounter
diplomatic_encounter:
  required: true
  country: US
  context: |
    The US President is concerned about UK unilateral actions and wants assurances
    before committing to Article 5 support. Your conversation will affect US willingness
    to support the UK and overall NATO solidarity.
  
  success_conditions:
